<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="lime-glow" cx="20%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#c9ff3d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9ff3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet-glow" cx="90%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#8b6dff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b6dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="badge-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#07080a"/>
  <rect width="1200" height="630" fill="url(#lime-glow)"/>
  <rect width="1200" height="630" fill="url(#violet-glow)"/>

  <!-- Grid overlay -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="128" x2="1200" y2="128" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="192" x2="1200" y2="192" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="256" x2="1200" y2="256" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="320" x2="1200" y2="320" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="384" x2="1200" y2="384" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="448" x2="1200" y2="448" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="512" x2="1200" y2="512" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="576" x2="1200" y2="576" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Logo mark badge -->
  <rect x="80" y="88" width="64" height="64" rx="16" fill="#c9ff3d"/>
  <rect x="80" y="88" width="64" height="64" rx="16" fill="url(#badge-shine)"/>
  <path d="M111 100L96 118h10l-2 14 14-18h-10l3-14z" fill="#0a0a0a"/>

  <!-- blinkit. wordmark -->
  <text x="162" y="138" font-family="Arial,sans-serif" font-weight="800" font-size="44" fill="#f5f6f7" letter-spacing="-1">blinkit</text>
  <text x="370" y="138" font-family="Arial,sans-serif" font-weight="800" font-size="44" fill="#c9ff3d">.</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial,sans-serif" font-weight="700" font-size="80" fill="#f5f6f7" letter-spacing="-3">Don't just think it.</text>
  <text x="80" y="360" font-family="Arial,sans-serif" font-weight="700" font-size="80" fill="#c9ff3d" letter-spacing="-3" font-style="italic">Blinkit it.</text>

  <!-- Subtext -->
  <text x="80" y="438" font-family="Arial,sans-serif" font-size="26" fill="#8a8f99">Groceries · Electronics · Pharmacy · Fashion — in 10 minutes.</text>

  <!-- Stats row -->
  <rect x="80" y="490" width="1" height="1" fill="none"/>
  <text x="80"  y="530" font-family="Arial,sans-serif" font-weight="700" font-size="28" fill="#f5f6f7">10 <tspan font-size="18" fill="#c9ff3d">min</tspan></text>
  <text x="80"  y="558" font-family="Arial,sans-serif" font-size="14" fill="#5c616b">AVG DELIVERY</text>

  <text x="240" y="530" font-family="Arial,sans-serif" font-weight="700" font-size="28" fill="#f5f6f7">25k <tspan font-size="18" fill="#c9ff3d">+</tspan></text>
  <text x="240" y="558" font-family="Arial,sans-serif" font-size="14" fill="#5c616b">PRODUCTS</text>

  <text x="380" y="530" font-family="Arial,sans-serif" font-weight="700" font-size="28" fill="#f5f6f7">1,200 <tspan font-size="18" fill="#c9ff3d">+</tspan></text>
  <text x="380" y="558" font-family="Arial,sans-serif" font-size="14" fill="#5c616b">NEIGHBORHOODS</text>

  <text x="570" y="530" font-family="Arial,sans-serif" font-weight="700" font-size="28" fill="#f5f6f7">4.9 <tspan font-size="18" fill="#c9ff3d">★</tspan></text>
  <text x="570" y="558" font-family="Arial,sans-serif" font-size="14" fill="#5c616b">APP RATING</text>

  <!-- Right side decorative card -->
  <rect x="820" y="160" width="300" height="72" rx="14" fill="rgba(17,20,26,0.9)" stroke="rgba(38,43,51,1)" stroke-width="1"/>
  <rect x="840" y="178" width="36" height="36" rx="9" fill="rgba(201,255,61,0.12)"/>
  <path d="M856 189l-5 9h4l-1 6 7-9h-4l-1-6z" fill="#c9ff3d"/>
  <text x="888" y="198" font-family="Arial,sans-serif" font-weight="600" font-size="15" fill="#f5f6f7">Order #4827</text>
  <text x="888" y="218" font-family="Arial,sans-serif" font-size="12" fill="#8a8f99">ETA · 6 MIN</text>
  <rect x="820" y="256" width="300" height="72" rx="14" fill="rgba(201,255,61,1)" stroke="none"/>
  <text x="845" y="281" font-family="Arial,sans-serif" font-weight="700" font-size="13" fill="#0a0a0a">⚡ LIVE · ON ROUTE</text>
  <text x="845" y="310" font-family="Arial,sans-serif" font-weight="600" font-size="18" fill="#0a0a0a">Your order is 6 min away</text>
  <rect x="820" y="352" width="300" height="72" rx="14" fill="rgba(17,20,26,0.9)" stroke="rgba(38,43,51,1)" stroke-width="1"/>
  <text x="845" y="378" font-family="Arial,sans-serif" font-weight="600" font-size="15" fill="#f5f6f7">🥦 Fresh groceries</text>
  <text x="845" y="400" font-family="Arial,sans-serif" font-size="12" fill="#8a8f99">8 MIN · 412 ITEMS IN STOCK</text>
</svg>
